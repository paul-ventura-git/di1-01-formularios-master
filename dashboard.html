<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 40px;
        }

        th, td {
            border: 1px solid black;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        h2 {
            margin-top: 40px;
        }
    </style>
</head>
<body>

  <nav style="text-align: end;">
      <a href="index.html">Registrar</a>
      <a href="Gallery.html">Galería</a>
      <a href="Dashboard.html">Dashboard</a>
  </nav>

  <h1>Dashboard del Sistema</h1>

  <h2>Clientes</h2>
  <input type="text" id="buscarClientes" placeholder="Buscar cliente...">
  <table id="tablaClientes">
      <thead>
          <tr>
              <th>ID</th>
              <th>Nombre Completo</th>
              <th>DNI</th>
              <th>Correo</th>
          </tr>
      </thead>
      <tbody></tbody>
  </table>

  <h2>Prestadores de Servicio</h2>
  <input type="text" id="buscarPrestadores" placeholder="Buscar prestador...">
  <table id="tablaPrestadores">
      <thead>
          <tr>
              <th>ID</th>
              <th>Nombre Completo</th>
              <th>DNI</th>
              <th>Especialidad</th>
          </tr>
      </thead>
      <tbody></tbody>
  </table>

  <h2>Comprobantes Emitidos</h2>
  <input type="text" id="buscarComprobantes" placeholder="Buscar comprobante...">
  <table id="tablaComprobantes">
      <thead>
          <tr>
              <th>N° Boleta</th>
              <th>ID Cliente</th>
              <th>ID Prestador</th>
              <th>Fecha</th>
              <th>Monto</th>
              <th>IGV</th>
              <th>Total</th>
          </tr>
      </thead>
      <tbody></tbody>
  </table>

  <script type="module" src="dashboard.js"></script>

</body>
</html>
